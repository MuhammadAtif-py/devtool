{% extends "base.html" %}
{% block title %}HEX ↔ RGB Converter{% endblock %}
{% block content %}
<section class="space-y-6" data-tool-page>
<nav class="text-sm muted flex items-center gap-2"><a href="/">Home</a><span>›</span><span>Converters</span><span>›</span><span class="text-[var(--text-main)]">Color Picker</span></nav>
<h1 class="text-2xl sm:text-3xl font-bold">HEX to RGB / RGB to HEX</h1>
<p class="muted">Convert color values between HEX and RGB formats.</p>
<form method="post" class="space-y-5" onsubmit="formLoadingState('color-submit')">
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5" data-scroll-reveal>
<section class="rounded-2xl border app-border app-surface min-h-[400px] overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-primary"><h2 class="font-semibold">Input</h2></header><div class="p-4 space-y-3"><input id="color-input" name="input_text" value="{{ input_text }}" class="w-full h-11 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="#FFAA00 or 255,170,0"><select name="mode" class="w-full h-11 px-3 rounded-lg border app-border app-elevated focus-glow"><option value="hex_to_rgb" {% if mode == 'hex_to_rgb' %}selected{% endif %}>HEX to RGB</option><option value="rgb_to_hex" {% if mode == 'rgb_to_hex' %}selected{% endif %}>RGB to HEX</option></select><textarea id="color-helper" data-charcount="color-counter" class="mono-area w-full h-44 rounded-xl border app-border app-elevated p-3 muted" readonly>Use #RRGGBB or R,G,B format.</textarea><div id="color-counter" class="text-xs muted">Characters: 0 | Lines: 0</div></div></section>
<section class="rounded-2xl border app-border app-surface min-h-[400px] overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-success flex justify-between"><h2 class="font-semibold">Output</h2><div class="flex gap-2"><button type="button" onclick="copyToClipboard('color-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Copy</button><button type="button" onclick="downloadOutput('color-output','color-output','txt')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Download</button><button type="button" onclick="fullscreenOutput('color-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Fullscreen</button></div></header><div class="p-4"><textarea id="color-output" readonly class="mono-area w-full h-64 rounded-xl border app-border bg-[#0d0d14] text-[#f8fafc] p-3">{{ result }}</textarea></div></section>
</div>
<div class="flex justify-center"><button id="color-submit" class="btn-gradient w-full sm:w-auto min-w-[220px] px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center justify-center gap-2"><span>Convert</span><span class="hidden tool-loading-spinner loader"></span></button></div>
</form>
</section>
{% endblock %}
