{% extends "base.html" %}
{% block title %}Password Generator{% endblock %}
{% block content %}
<section class="space-y-6" data-tool-page>
<nav class="text-sm muted flex items-center gap-2"><a href="/">Home</a><span>›</span><span>Generators</span><span>›</span><span class="text-[var(--text-main)]">Password Generator</span></nav>
<h1 class="text-2xl sm:text-3xl font-bold">Password Generator</h1>
<p class="muted">Generate strong passwords by length and symbol settings.</p>
<form method="post" class="space-y-5" onsubmit="formLoadingState('pwd-submit')">
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5" data-scroll-reveal>
<section class="rounded-2xl border app-border app-surface p-4 min-h-[360px]"><h2 class="font-semibold mb-2">Input</h2><input type="number" min="4" max="256" name="length" value="{{ length }}" class="w-full h-11 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Length"><label class="mt-3 flex items-center gap-2 text-sm"><input type="checkbox" name="use_symbols" value="true" {% if use_symbols %}checked{% endif %}> Include symbols</label><textarea id="pwd-input-note" data-charcount="pwd-counter" class="mono-area w-full h-40 mt-3 rounded-xl border app-border app-elevated p-3 muted" readonly>Recommended length: 16+ with symbols.</textarea><div id="pwd-counter" class="text-xs muted mt-2">Characters: 0 | Lines: 0</div></section>
<section class="rounded-2xl border app-border app-surface min-h-[360px] overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-success flex justify-between"><h2 class="font-semibold">Output</h2><div class="flex gap-2"><button type="button" onclick="copyToClipboard('pwd-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Copy</button><button type="button" onclick="downloadOutput('pwd-output','password','txt')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Download</button><button type="button" onclick="fullscreenOutput('pwd-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Fullscreen</button></div></header><div class="p-4"><textarea id="pwd-output" readonly class="mono-area w-full h-64 rounded-xl border app-border bg-[#0d0d14] text-[#f8fafc] p-3">{{ result }}</textarea></div></section>
</div>
<div class="flex justify-center"><button id="pwd-submit" class="btn-gradient w-full sm:w-auto min-w-[220px] px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center justify-center gap-2"><span>Generate Password</span><span class="hidden tool-loading-spinner loader"></span></button></div>
</form>
</section>
{% endblock %}
