{% extends "base.html" %}
{% block title %}Regex Tester{% endblock %}
{% block content %}
<section class="space-y-6" data-tool-page>
<nav class="text-sm muted flex items-center gap-2"><a href="/">Home</a><span>›</span><span>Text</span><span>›</span><span class="text-[var(--text-main)]">Regex Tester</span></nav>
<h1 class="text-2xl sm:text-3xl font-bold">Regex Tester</h1>
<p class="muted">Test regex patterns and inspect highlighted matches.</p>
<form method="post" class="space-y-5" onsubmit="formLoadingState('regex-submit')">
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5" data-scroll-reveal>
<section class="rounded-2xl border app-border app-surface overflow-hidden min-h-[480px] flex flex-col"><header class="px-4 py-3 border-b app-border border-t-2 border-t-primary"><h2 class="font-semibold">Input</h2></header><div class="p-4 space-y-3"><input name="pattern" value="{{ pattern }}" class="w-full h-11 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Regex pattern"><label class="flex items-center gap-2 text-sm"><input type="checkbox" name="ignore_case" value="true" {% if ignore_case %}checked{% endif %}> Ignore case</label><div class="relative h-64 rounded-xl border app-border overflow-hidden bg-[#0d0d14]"><div id="regex-input-lines" class="absolute left-0 top-0 bottom-0 w-12 bg-[#11111a] text-[11px] text-[#64748b] text-right pr-2 py-3"></div><textarea id="regex-input" name="test_string" data-linenumbers="regex-input-lines" data-charcount="regex-counter" class="absolute inset-0 pl-14 pr-4 py-3 w-full h-full bg-transparent mono-area text-[#f8fafc] resize-none outline-none">{{ test_string }}</textarea></div><div id="regex-counter" class="text-xs muted">Characters: 0 | Lines: 0</div></div></section>
<section class="rounded-2xl border app-border app-surface overflow-hidden min-h-[480px] flex flex-col"><header class="px-4 py-3 border-b app-border border-t-2 border-t-success flex justify-between"><h2 class="font-semibold">Output</h2><div class="flex gap-2"><button type="button" onclick="copyToClipboard('regex-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Copy</button><button type="button" onclick="downloadOutput('regex-output','regex-matches','txt')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Download</button><button type="button" onclick="fullscreenOutput('regex-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Fullscreen</button></div></header><div class="p-4 space-y-3 flex-1"><textarea id="regex-output" readonly class="mono-area w-full h-32 rounded-xl border app-border bg-[#0d0d14] text-[#f8fafc] p-3">{{ result }}</textarea><div class="flex-1 min-h-[180px] rounded-xl border app-border bg-[#0d0d14] p-3 overflow-auto whitespace-pre-wrap break-words">{{ highlighted|safe }}</div></div></section>
</div>
<div class="flex justify-center"><button id="regex-submit" class="btn-gradient w-full sm:w-auto min-w-[220px] px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center justify-center gap-2"><span>Test Regex</span><span class="hidden tool-loading-spinner loader"></span></button></div>
</form>
</section>
{% endblock %}
