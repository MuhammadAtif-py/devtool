{% extends "base.html" %}
{% block title %}Hash Generator{% endblock %}
{% block content %}
<section class="space-y-6" data-tool-page>
<nav class="text-sm muted flex items-center gap-2"><a href="/">Home</a><span>›</span><span>Generators</span><span>›</span><span class="text-[var(--text-main)]">Hash Generator</span></nav>
<h1 class="text-2xl sm:text-3xl font-bold">Hash Generator</h1>
<p class="muted">Generate MD5, SHA1, SHA256, or SHA512 hash values.</p>
<form method="post" class="space-y-5" onsubmit="formLoadingState('hash-submit')">
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5" data-scroll-reveal>
<section class="rounded-2xl border app-border app-surface min-h-[440px] flex flex-col overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-primary flex justify-between"><div><h2 class="font-semibold">Input</h2><p class="text-xs muted">Plain text</p></div><div class="flex gap-2"><button type="button" onclick="pasteFromClipboard('hash-input')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Paste</button><button type="button" onclick="clearInput('hash-input')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Clear</button></div></header><div class="p-4 space-y-3 flex-1"><select name="algorithm" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow"><option value="md5" {% if algorithm == 'md5' %}selected{% endif %}>MD5</option><option value="sha1" {% if algorithm == 'sha1' %}selected{% endif %}>SHA1</option><option value="sha256" {% if algorithm == 'sha256' %}selected{% endif %}>SHA256</option><option value="sha512" {% if algorithm == 'sha512' %}selected{% endif %}>SHA512</option></select><div class="relative flex-1 min-h-[290px] rounded-xl border app-border overflow-hidden bg-[#0d0d14]"><div id="hash-input-lines" class="absolute left-0 top-0 bottom-0 w-12 bg-[#11111a] text-[11px] text-[#64748b] text-right pr-2 py-3"></div><textarea id="hash-input" name="input_text" data-linenumbers="hash-input-lines" data-charcount="hash-counter" class="absolute inset-0 pl-14 pr-4 py-3 w-full h-full bg-transparent mono-area text-[#f8fafc] resize-none outline-none">{{ input_text }}</textarea></div><div id="hash-counter" class="text-xs muted">Characters: 0 | Lines: 0</div></div></section>
<section class="rounded-2xl border app-border app-surface min-h-[440px] flex flex-col overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-success flex justify-between"><div><h2 class="font-semibold">Output</h2><p class="text-xs muted">Hash value</p></div><div class="flex gap-2"><button type="button" onclick="copyToClipboard('hash-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Copy</button><button type="button" onclick="downloadOutput('hash-output','hash-output','txt')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Download</button><button type="button" onclick="fullscreenOutput('hash-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Fullscreen</button></div></header><div class="p-4 flex-1"><div class="relative h-full rounded-xl border app-border overflow-hidden bg-[#0d0d14]"><div id="hash-output-lines" class="absolute left-0 top-0 bottom-0 w-12 bg-[#11111a] text-[11px] text-[#64748b] text-right pr-2 py-3"></div><textarea id="hash-output" readonly data-linenumbers="hash-output-lines" class="absolute inset-0 pl-14 pr-4 py-3 w-full h-full bg-transparent mono-area text-[#f8fafc] resize-none outline-none">{{ result }}</textarea></div></div></section>
</div>
<div class="flex justify-center"><button id="hash-submit" class="btn-gradient w-full sm:w-auto min-w-[220px] px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center justify-center gap-2"><span>Generate Hash</span><span class="hidden tool-loading-spinner loader"></span></button></div>
</form>
</section>
{% endblock %}
