{% extends "base.html" %}
{% block title %}Meta Tag Generator{% endblock %}
{% block content %}
<section class="space-y-6" data-tool-page>
<nav class="text-sm muted flex items-center gap-2"><a href="/">Home</a><span>›</span><span>Generators</span><span>›</span><span class="text-[var(--text-main)]">Meta Generator</span></nav>
<h1 class="text-2xl sm:text-3xl font-bold">Meta Tag Generator</h1>
<p class="muted">Generate SEO, OpenGraph, and Twitter meta tags.</p>
<form method="post" class="space-y-5" onsubmit="formLoadingState('meta-submit')">
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5" data-scroll-reveal>
<section class="rounded-2xl border app-border app-surface min-h-[520px] overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-primary"><h2 class="font-semibold">Input</h2></header><div class="p-4 space-y-3"><input name="title" value="{{ title }}" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Title"><input name="description" value="{{ description }}" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Description"><input name="url" value="{{ url }}" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="URL"><input name="image" value="{{ image }}" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Image URL"><input name="site_name" value="{{ site_name }}" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow" placeholder="Site name"><select name="twitter_card" class="w-full h-10 px-3 rounded-lg border app-border app-elevated focus-glow"><option value="summary" {% if twitter_card == 'summary' %}selected{% endif %}>summary</option><option value="summary_large_image" {% if twitter_card == 'summary_large_image' %}selected{% endif %}>summary_large_image</option></select></div></section>
<section class="rounded-2xl border app-border app-surface min-h-[520px] overflow-hidden"><header class="px-4 py-3 border-b app-border border-t-2 border-t-success flex justify-between"><h2 class="font-semibold">Output</h2><div class="flex gap-2"><button type="button" onclick="copyToClipboard('meta-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Copy</button><button type="button" onclick="downloadOutput('meta-output','meta-tags','html')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Download</button><button type="button" onclick="fullscreenOutput('meta-output')" class="px-3 py-1.5 text-xs rounded-lg border app-border">Fullscreen</button></div></header><div class="p-4"><textarea id="meta-output" readonly class="mono-area w-full h-[430px] rounded-xl border app-border bg-[#0d0d14] text-[#f8fafc] p-3">{{ result }}</textarea></div></section>
</div>
<div class="flex justify-center"><button id="meta-submit" class="btn-gradient w-full sm:w-auto min-w-[220px] px-6 py-3 rounded-xl text-white font-semibold inline-flex items-center justify-center gap-2"><span>Generate Tags</span><span class="hidden tool-loading-spinner loader"></span></button></div>
</form>
</section>
{% endblock %}
